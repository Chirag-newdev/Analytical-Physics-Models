<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytical Physics Models</title>

<style>
:root {
    /* Typography */
    --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-size-base: 14px;
    --font-size-title: 16px;
    --font-size-logo: 22px;
    --font-size-category: 12px;

    /* Colors */
    --bg-main: #4d7194;
    --panel-bg: #ffffff;
    --topbar-bg: rgba(255, 255, 255, 0.8);

    --accent-primary: #3b82f6;
    --accent-primary-hover: #2563eb;
    --accent-soft: #e0f2fe;

    --text-main: #334155;
    --text-muted: #64748b;
    --text-accent: #2473e1;

    --border-color: #e2e8f0;

    /* Shadows */
    --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05),
                   0 2px 4px -1px rgba(0, 0, 0, 0.03);

    --shadow-sidebar: 2px 0 10px rgba(0, 0, 0, 0.02);
    --shadow-button: 0 4px 14px rgba(59, 130, 246, 0.3);

    /* Radius */
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 15px;
    --radius-xl: 20px;

    /* Spacing */
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 20px;
    --space-xl: 24px;
}

* {
    box-sizing: border-box;
    margin: 0;
}

body {
    height: 100vh;
    display: flex;
    font-family: var(--font-main);
    background-color: var(--bg-main);
    color: var(--text-main);
    font-size: var(--font-size-base);
}

/* Sidebar */
#sidebar {
    width: 300px;
    padding: var(--space-xl);
    background: var(--panel-bg);
    border-right: 1px solid var(--border-color);
    overflow-y: auto;
    box-shadow: var(--shadow-sidebar);
}

/* Logo */
.logo {
    font-size: var(--font-size-logo);
    font-weight: 700;
    margin-bottom: var(--space-lg);
    color: var(--accent-primary);
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo::before {
    content: '⚛';
}

/* Categories */
.category {
    font-size: var(--font-size-category);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: var(--space-lg);
    margin-bottom: var(--space-sm);
    color: var(--text-accent);
}

/* Items */
.item {
    padding: var(--space-md);
    margin-top: 4px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: 0.2s;
    color: var(--text-muted);
}

.item:hover {
    background: #f8fafc;
    color: var(--accent-primary);
    transform: translateX(4px);
}

.active {
    background: var(--accent-soft);
    color: var(--accent-primary);
    font-weight: 600;
}

/* Main */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: var(--space-lg);
    /* background-color:var(--accent-primary); */
    background: var(--accent-primary);
}

/* Topbar */
#topbar {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-xl);
    background: var(--topbar-bg);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-lg);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--panel-bg);
}

#modelTitle {
    font-size: var(--font-size-title);
    font-weight: 600;
}

/* Button */
.controls button {
    background: var(--accent-primary);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-button);
    transition: 0.2s;
}

.controls button:hover {
    background: var(--accent-primary-hover);
    transform: translateY(-1px);
}

/* Viewer */
#viewerContainer {
    flex: 1;
}

#viewer {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: var(--radius-xl);
    background: white;
    box-shadow: var(--shadow-soft);
}
</style>
</head>

<body>

<div id="sidebar">
    <div class="logo">Analytical Physics Models</div>
</div>

<div id="main">
    <div id="topbar">
        <div id="modelTitle">Welcome! Select a model</div>
        <div class="controls">
            <button onclick="reloadModel()">🔄 Refresh</button>
        </div>
    </div>

    <div id="viewerContainer">
        <iframe id="viewer"></iframe>
    </div>
</div>

<script>
let currentItem = null;
let currentPath = null;

function loadModel(path, name, element) {
    const viewer = document.getElementById("viewer");
    const title = document.getElementById("modelTitle");

    viewer.src = path;
    title.textContent = name;
    currentPath = path;

    if (currentItem) currentItem.classList.remove("active");
    element.classList.add("active");
    currentItem = element;
}

function reloadModel() {
    if (currentPath) {
        document.getElementById("viewer").src = currentPath;
    }
}

fetch("models.json")
.then(res => res.json())
.then(data => {
    const sidebar = document.getElementById("sidebar");

    data.forEach(section => {
        const cat = document.createElement("div");
        cat.textContent = section.category;
        cat.className = "category";
        sidebar.appendChild(cat);

        section.items.forEach(model => {
            const item = document.createElement("div");
            item.textContent = model.name;
            item.className = "item";

            item.onclick = () => loadModel(model.path, model.name, item);

            sidebar.appendChild(item);

            if (!currentItem) {
                loadModel(model.path, model.name, item);
            }
        });
    });
});
</script>

</body>
</html>
